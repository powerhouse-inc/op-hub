scalar Unknown
scalar DateTime
scalar Attachment
scalar Address
scalar Amount_Tokens
scalar EthereumAddress
scalar EmailAddress
scalar Amount_Percentage
scalar Date
scalar URL
scalar Amount_Money
scalar OLabel
scalar Currency
scalar PHID
scalar OID
scalar Amount_Fiat
scalar Amount_Currency
scalar Amount_Crypto
scalar Amount
scalar Upload

type ServiceOfferingState {
    id: PHID
    operatorId: PHID
    resourceTemplateId: PHID
    title: String!
    summary: String!
    description: String
    thumbnailUrl: URL
    infoLink: URL
    status: ServiceStatus!
    lastModified: DateTime
    availableBillingCycles: [BillingCycle!]!
    facetTargets: [FacetTarget!]!
    services: [Service!]!
    tiers: [ServiceSubscriptionTier!]!
    optionGroups: [OptionGroup!]!
}

enum ServiceStatus {
    DRAFT
    COMING_SOON
    ACTIVE
    DEPRECATED
}

type FacetTarget {
    id: OID!
    categoryKey: String!
    categoryLabel: String!
    selectedOptions: [String!]!
}

type DiscountRule {
    discountType: DiscountType!
    discountValue: Float!
}

enum DiscountType {
    PERCENTAGE
    FLAT_AMOUNT
}

type BillingCycleDiscount {
    billingCycle: BillingCycle!
    discountRule: DiscountRule!
}

type SetupCost {
    amount: Amount_Money!
    currency: Currency!
    discount: DiscountRule
}

type RecurringPriceOption {
    id: OID!
    billingCycle: BillingCycle!
    amount: Amount_Money!
    currency: Currency!
    discount: DiscountRule
}

type Service {
    id: OID!
    title: String!
    description: String
    displayOrder: Int
    isSetupFormation: Boolean!
    optionGroupId: OID
}

type ServiceSubscriptionTier {
    id: OID!
    name: String!
    description: String
    isCustomPricing: Boolean!
    pricingMode: TierPricingMode
    pricing: ServicePricing!
    defaultBillingCycle: BillingCycle
    mostPopular: Boolean!
    billingCycleDiscounts: [BillingCycleDiscount!]!
    serviceLevels: [ServiceLevelBinding!]!
    usageLimits: [ServiceUsageLimit!]!
    excludeFromSetupFee: Boolean!
}

type ServicePricing {
    amount: Amount_Money
    currency: Currency!
}

enum BillingCycle {
    MONTHLY
    QUARTERLY
    SEMI_ANNUAL
    ANNUAL
    ONE_TIME
}

type ServiceLevelBinding {
    id: OID!
    serviceId: OID!
    level: ServiceLevel!
    customValue: String
    optionGroupId: OID
}

enum ServiceLevel {
    INCLUDED
    NOT_INCLUDED
    OPTIONAL
    CUSTOM
    VARIABLE
    NOT_APPLICABLE
}

type ServiceUsageLimit {
    id: OID!
    serviceId: OID!
    metric: String!
    unitName: String
    freeLimit: Int
    paidLimit: Int
    metricType: MetricType!
    accrualCycle: AccrualCycle!
    notes: String
    unitPrice: Amount_Money
    unitPriceCurrency: Currency
}

enum AccrualCycle {
    HOURLY
    DAILY
    WEEKLY
    MONTHLY
    QUARTERLY
    SEMI_ANNUAL
    ANNUAL
}

enum MetricType {
    CUMULATIVE
    NON_CUMULATIVE
}

type OptionGroup {
    id: OID!
    name: String!
    description: String
    isAddOn: Boolean!
    defaultSelected: Boolean!
    pricingMode: AddOnPricingMode
    standalonePricing: StandalonePricing
    tierDependentPricing: [OptionGroupTierPricing!]
    costType: GroupCostType
    availableBillingCycles: [BillingCycle!]!
    billingCycleDiscounts: [BillingCycleDiscount!]!
    discountMode: DiscountMode
    price: Amount_Money
    currency: Currency
}

enum AddOnPricingMode {
    TIER_DEPENDENT
    STANDALONE
}

enum DiscountMode {
    INHERIT_TIER
    INDEPENDENT
}

enum TierPricingMode {
    CALCULATED
    MANUAL_OVERRIDE
}

type StandalonePricing {
    setupCost: SetupCost
    recurringPricing: [RecurringPriceOption!]!
}

type OptionGroupTierPricing {
    id: OID!
    tierId: OID!
    setupCost: SetupCost
    setupCostDiscounts: [BillingCycleDiscount!]!
    recurringPricing: [RecurringPriceOption!]!
}

enum GroupCostType {
    RECURRING
    SETUP
}

