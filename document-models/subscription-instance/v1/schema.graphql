"""
Operator-initiated invoice generation. Replaces the prior SETTLE_BILLING_CYCLE
operation. Per 2026-05-07 stakeholder call: a single 'Generate Invoice'
operator action force-accrues all metrics, sweeps every CHARGED slice to
INVOICED stamping each with `invoiceRef`, and (when the simulated/actual
clock is past `nextBillingDate` and `advanceCycleIfDue` is true) advances
the billing cycle by emitting next-cycle SUBSCRIPTION_FEE slices and
consuming any standing carry-over credit.
"""
input GenerateInvoiceInput {
    "Pre-generated invoice document ID to stamp on every swept slice."
    invoiceId: PHID!
    generatedAt: DateTime!
    "When true and currentTime >= nextBillingDate, advances the cycle and emits next-cycle slices."
    advanceCycleIfDue: Boolean
    "Pre-generated frozen-slice IDs for any live DYNAMIC slices that need crystallising at the accrual boundary."
    metricFreezeSliceIds: [SettleSliceIdMappingInput!]!
    "Pre-generated SUBSCRIPTION_FEE slice IDs for the next cycle (only used when cycle actually advances)."
    nextCycleRecurringSliceIds: [SettleSliceIdMappingInput!]!
}

input ChangePlanInput {
    newTierPricingOptionId: OID!
    effectiveDate: DateTime!
    newBillingCycle: BillingCycle
    creditLineItemId: OID!
    debitLineItemId: OID!
    newTierName: String
