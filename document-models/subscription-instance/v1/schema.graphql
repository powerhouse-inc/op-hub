"""
Origin tag on each debt line item. MVP reducers emit only SETUP,
SUBSCRIPTION_FEE, and DYNAMIC. The reserved values are for utility-style
billing (where billing cycle < accrual cycle) and reconciliation true-ups
at long-accrual close. The reserved branches throw via
`assertEmittableOrigin` until their reducer logic ships.
See: BA Q2 resolution (2026-05-01) + walkthrough §10.1 roadmap.
"""
enum DebtOriginType {
    SETUP
    SUBSCRIPTION_FEE
    DYNAMIC
    # Reserved for future — utility-billing case (billing cycle < accrual cycle).
    # Throws on emission via assertEmittableOrigin in utils.ts.
    ESTIMATED_USAGE
    # Reserved for future — true-up at end of long accrual cycle against
    # ESTIMATED_USAGE slices. Throws on emission via assertEmittableOrigin.
    RECONCILIATION
}

enum DebtLineItemStatus {
    CHARGED
    INVOICED
    PARTIALLY_PAID
    FULLY_PAID
}

type DebtLineItem {
    id: OID!
    origin: DebtOriginType!
    status: DebtLineItemStatus!
    invoiced: Boolean!
    debitAmount: Amount_Money!
    settledAmount: Amount_Money!
    "Portion of `settledAmount` that came from APPLY_CREDIT (vs cash payment). Cumulative."
    creditApplied: Amount_Money!
    currency: Currency!
    chargedAt: DateTime!
    invoicedAt: DateTime
    fullyPaidAt: DateTime
    sourceServiceId: OID
    sourceMetricId: OID
    sourceGroupId: OID
    frozen: Boolean!
    accrualPeriodStart: DateTime
    invoiceRef: PHID
    lastPaymentRef: PHID
    description: String
}

